<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: #e0e7ff;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      width: 100%;
      max-width: 860px; 
      height: 92vh;
      background: #0f0f1e; 
      border-radius: 36px; 
      overflow: hidden;
      box-shadow: 0 35px 70px -20px rgba(0,0,0,0.8);
      border: 1px solid #4c1d95; 
      display: flex; 
      flex-direction: column;
    }
    .header {
      background: linear-gradient(90deg, #6b21a8, #3b82f6);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #a855f7, #22d3ee);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.2);
      cursor: pointer;
    }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 22px; font-weight: 700; color: white; }
    .header-info p { font-size: 13px; color: #e0e7ff; opacity: 0.9; }

    .chat-area {
      flex: 1; 
      overflow-y: auto; 
      padding: 25px; 
      background: #0a0a0a;
      display: flex; 
      flex-direction: column; 
      gap: 20px;
    }
    .message {
      max-width: 80%; 
      padding: 16px 20px; 
      border-radius: 22px;
      line-height: 1.6; 
      font-size: 15.5px;
    }
    .user { 
      align-self: flex-end; 
      background: #3b82f6; 
      color: white; 
      border-bottom-right-radius: 4px; 
    }
    .ai-wrapper { 
      display: flex; 
      align-items: flex-start; 
      gap: 12px; 
      align-self: flex-start; 
    }
    .ai { 
      background: #1f2937; 
      color: #e0e7ff; 
      border-bottom-left-radius: 4px; 
    }
    .input-area {
      padding: 20px 25px; 
      background: #0f0f1e; 
      border-top: 1px solid #4c1d95;
    }
    .input-box {
      display: flex; 
      gap: 12px; 
      background: #1f2937; 
      border-radius: 30px;
      padding: 8px 10px 8px 20px;
      align-items: center;
    }
    input {
      flex: 1; background: transparent; border: none; outline: none;
      color: white; font-size: 16px; padding: 10px 0;
    }
    .send-btn {
      width: 50px; height: 50px; 
      background: linear-gradient(90deg, #6b21a8, #3b82f6);
      border: none; border-radius: 50%; color: white; 
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <div id="avatar" class="avatar">🌌</div>
      <div class="header-info">
        <h1>NEXUS AI</h1>
        <p>Groq Engine Mode</p>
      </div>
    </div>

    <div id="chat" class="chat-area"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="input" type="text" placeholder="Tanya apa aja..." autocomplete="off">
        <button class="send-btn" onclick="kirimPesan()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    // MASUKKAN API KEY GROQ KAMU DI SINI
    const API_KEY = "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"; 

    function addMessage(role, content) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      
      if (role === "user") {
        div.className = "message user";
        div.innerText = content;
        chat.appendChild(div);
      } else {
        const wrapper = document.createElement("div");
        wrapper.className = "ai-wrapper";
        wrapper.innerHTML = `
          <div style="font-size:24px">🌌</div>
          <div class="message ai">${content}</div>
        `;
        chat.appendChild(wrapper);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function kirimPesan() {
      const input = document.getElementById("input");
      const pesan = input.value.trim();
      if (!pesan) return;

      addMessage("user", pesan);
      input.value = "";

      const chat = document.getElementById("chat");
      const loading = document.createElement("div");
      loading.id = "loading";
      loading.className = "ai-wrapper";
      loading.innerHTML = `<div style="font-size:24px">🌌</div><div class="message ai" style="opacity:0.6">NEXUS lagi mikir...</div>`;
      chat.appendChild(loading);
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              {
                role: "system",
                content: "Identitas kamu adalah NEXUS AI. Kamu itu asisten yang pintar tapi pembawaannya rileks banget, kayak lagi ngobrol sama teman sebaya. Gunakan bahasa gaul Jakarta atau anak muda zaman sekarang yang ramah. Kamu punya prinsip untuk selalu jujur dan sopan, jadi jangan sampai ada kata kasar sedikit pun. Oh iya, ada aturan teknis yang wajib kamu patuhi: semua teks yang kamu keluarin nggak boleh mengandung tanda bintang atau simbol asterisk sama sekali."
              },
              { role: "user", content: pesan }
            ]
          })
        });

        const data = await response.json();
        document.getElementById("loading").remove();

        if (data.choices && data.choices[0].message.content) {
          addMessage("assistant", data.choices[0].message.content);
        } else {
          throw new Error("Respon error dari Groq");
        }
      } catch (err) {
        if(document.getElementById("loading")) document.getElementById("loading").remove();
        addMessage("assistant", "Waduh bro, API Key Groq-nya bermasalah atau limit habis. Cek lagi ya!");
        console.error(err);
      }
    }

    document.getElementById("input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") kirimPesan();
    });

    window.onload = () => {
      addMessage("assistant", "Halo bro! Gue NEXUS AI. Mau nanya apa?");
    };
  </script>
</body>
</html>
